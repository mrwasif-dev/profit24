<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Logs - Profit24</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <nav class="dashboard-nav">
            <div class="logo"><i class="fas fa-chart-line"></i> PROFIT24</div>
            <button onclick="location.href='dashboard.html'" class="back-btn"><i class="fas fa-arrow-left"></i> Back</button>
        </nav>
        <div class="history-header">
            <h1><i class="fas fa-history"></i> Deposit Logs</h1>
            <p>View all your deposit history</p>
        </div>
        <div class="transaction-list" id="depositLogs">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
        </div>
    </div>
    <script src="js/main.js"></script>
    <script>
        checkAuth();
        (async () => {
            const token = getToken();
            const response = await fetch(`${API_URL}/api/deposit/my-deposits`, { 
                headers: { 'Authorization': `Bearer ${token}` } 
            });
            const deposits = await response.json();
            const container = document.getElementById('depositLogs');
            if (deposits.length === 0) {
                container.innerHTML = '<div class="no-data"><i class="fas fa-inbox"></i> No deposit history found</div>';
            } else {
                container.innerHTML = deposits.map((d, i) => `
                    <div class="transaction-item" style="animation-delay: ${i * 0.05}s">
                        <div class="transaction-icon deposit"><i class="fas fa-arrow-down"></i></div>
                        <div class="transaction-info">
                            <div class="transaction-type">DEPOSIT</div>
                            <div class="transaction-date">${new Date(d.createdAt).toLocaleString()}</div>
                            <div class="transaction-desc">Plan ${d.planId} | TXID: ${d.transactionId}</div>
                        </div>
                        <div class="transaction-amount positive">+ ${d.amount.toLocaleString()} PKR</div>
                        <div class="transaction-status status-${d.status}">${d.status}</div>
                    </div>
                `).join('');
            }
        })();
    </script>
</body>
</html>
