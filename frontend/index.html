<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profit24 - Earn 11% Daily</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="landing-page">
            <div class="logo">
                <h1>💰 PROFIT24</h1>
                <p>Earn 11% Daily Profit for 60 Days</p>
            </div>
            
            <div class="auth-buttons">
                <button onclick="showSignIn()" class="btn-primary">Sign In</button>
                <button onclick="showSignUp()" class="btn-secondary">Sign Up</button>
            </div>
            
            <div class="features">
                <div class="feature">
                    <span>✅</span>
                    <span>60 Days Returns</span>
                </div>
                <div class="feature">
                    <span>📈</span>
                    <span>11% Daily Profit</span>
                </div>
                <div class="feature">
                    <span>💸</span>
                    <span>Withdraw from 30 PKR</span>
                </div>
                <div class="feature">
                    <span>🔗</span>
                    <span>Referral Bonus 11%</span>
                </div>
            </div>
        </div>
        
        <!-- Sign In Modal -->
        <div id="signinModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal('signinModal')">&times;</span>
                <h2>Sign In</h2>
                <input type="text" id="loginUsername" placeholder="Username" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button onclick="signIn()" class="btn-primary">Sign In</button>
            </div>
        </div>
        
        <!-- Sign Up Modal -->
        <div id="signupModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal('signupModal')">&times;</span>
                <h2>Sign Up</h2>
                <input type="text" id="signupUsername" placeholder="Username" required>
                <input type="tel" id="signupWhatsapp" placeholder="WhatsApp Number" required>
                <input type="password" id="signupPassword" placeholder="Password" required>
                <input type="text" id="referralCode" placeholder="Referral Code (Optional)">
                <button onclick="signUp()" class="btn-primary">Sign Up</button>
            </div>
        </div>
    </div>
    
    <script src="js/main.js"></script>
</body>
</html>
