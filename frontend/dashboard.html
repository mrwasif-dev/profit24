<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Profit24</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="dashboard-nav">
            <div class="logo">
                <i class="fas fa-chart-line"></i>
                PROFIT24
            </div>
            <div class="user-menu">
                <div class="welcome-text">
                    <i class="fas fa-user-circle"></i>
                    <span id="username"></span>
                </div>
                <div class="dropdown">
                    <button class="dropdown-btn">
                        <i class="fas fa-cog"></i>
                    </button>
                    <div class="dropdown-content">
                        <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
                        <a href="my-team.html"><i class="fas fa-users"></i> My Team</a>
                        <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
            </div>
        </nav>

        <div class="balance-card">
            <div class="balance-header">
                <i class="fas fa-wallet"></i>
                <h3>My Balance</h3>
            </div>
            <div class="balance-amount" id="balance">
                <span class="currency">PKR</span>
                <span class="amount">0</span>
            </div>
            <div class="stats-grid">
                <div class="stat-item">
                    <i class="fas fa-chart-line"></i>
                    <span class="stat-label">Total Deposit</span>
                    <span class="stat-value" id="totalDeposit">0 PKR</span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-coins"></i>
                    <span class="stat-label">Total Profit</span>
                    <span class="stat-value" id="totalProfit">0 PKR</span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-gift"></i>
                    <span class="stat-label">Referral Bonus</span>
                    <span class="stat-value" id="referralBonus">0 PKR</span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-money-bill-wave"></i>
                    <span class="stat-label">Total Withdraw</span>
                    <span class="stat-value" id="totalWithdraw">0 PKR</span>
                </div>
            </div>
        </div>

        <div class="dashboard-buttons">
            <button onclick="location.href='plans.html'" class="dash-btn">
                <i class="fas fa-coins"></i>
                <span>Deposit</span>
            </button>
            <button onclick="location.href='withdraw.html'" class="dash-btn">
                <i class="fas fa-money-bill-wave"></i>
                <span>Widraw</span>
            </button>
            <button onclick="location.href='my-plan.html'" class="dash-btn">
                <i class="fas fa-chart-simple"></i>
                <span>My Plan</span>
            </button>
            <button onclick="location.href='deposit-logs.html'" class="dash-btn">
                <i class="fas fa-history"></i>
                <span>Deposit Logs</span>
            </button>
            <button onclick="location.href='withdraw-logs.html'" class="dash-btn">
                <i class="fas fa-receipt"></i>
                <span>Widraw Logs</span>
            </button>
            <button onclick="location.href='transaction-history.html'" class="dash-btn">
                <i class="fas fa-list-ul"></i>
                <span>Transactions</span>
            </button>
            <button onclick="location.href='my-team.html'" class="dash-btn">
                <i class="fas fa-users"></i>
                <span>My Team</span>
            </button>
        </div>

        <div class="quick-actions">
            <div class="referral-card">
                <i class="fas fa-link"></i>
                <div class="referral-info">
                    <h4>Your Referral Link</h4>
                    <div class="referral-link" id="referralLink">Loading...</div>
                    <button onclick="copyReferralLink()" class="copy-link-btn">
                        <i class="fas fa-copy"></i> Copy Link
                    </button>
                </div>
            </div>
        </div>

        <div class="recent-activity">
            <h3><i class="fas fa-clock"></i> Recent Activity</h3>
            <div class="activity-list" id="recentActivity">
                <div class="loading">Loading recent activity...</div>
            </div>
        </div>
    </div>

    <div class="floating-whatsapp">
        <a href="#" id="floatingWhatsappLink" target="_blank">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>

    <script src="js/main.js"></script>
    <script>
        checkAuth();
        loadDashboard();
        loadReferralLink();
        loadRecentActivity();

        async function loadDashboard() {
            const token = getToken();
            const response = await fetch(`${API_URL}/api/auth/profile`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const user = await response.json();
            
            document.getElementById('username').innerText = user.username;
            document.getElementById('balance').innerHTML = `<span class="currency">PKR</span><span class="amount">${user.balance.toLocaleString()}</span>`;
            document.getElementById('totalDeposit').innerHTML = `${user.totalDeposit.toLocaleString()} PKR`;
            document.getElementById('totalProfit').innerHTML = `${user.totalProfit.toLocaleString()} PKR`;
            document.getElementById('referralBonus').innerHTML = `${user.totalReferralBonus.toLocaleString()} PKR`;
            document.getElementById('totalWithdraw').innerHTML = `${user.totalWithdraw.toLocaleString()} PKR`;
        }

        async function loadReferralLink() {
            const token = getToken();
            const response = await fetch(`${API_URL}/api/team/referral-link`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            document.getElementById('referralLink').innerText = data.link;
        }

        function copyReferralLink() {
            const link = document.getElementById('referralLink').innerText;
            navigator.clipboard.writeText(link);
            showToast('Referral link copied!', 'success');
        }

        async function loadRecentActivity() {
            const token = getToken();
            const response = await fetch(`${API_URL}/api/transactions`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const transactions = await response.json();
            const recent = transactions.slice(0, 5);
            const container = document.getElementById('recentActivity');
            
            if (recent.length === 0) {
                container.innerHTML = '<div class="no-data">No recent activity</div>';
                return;
            }
            
            container.innerHTML = recent.map(tx => `
                <div class="activity-item">
                    <div class="activity-icon ${tx.type}">
                        <i class="fas ${tx.type === 'deposit' ? 'fa-arrow-down' : tx.type === 'withdraw' ? 'fa-arrow-up' : 'fa-chart-line'}"></i>
                    </div>
                    <div class="activity-details">
                        <div class="activity-title">${tx.description || tx.type}</div>
                        <div class="activity-date">${new Date(tx.createdAt).toLocaleString()}</div>
                    </div>
                    <div class="activity-amount ${tx.type === 'deposit' ? 'positive' : 'negative'}">
                        ${tx.type === 'deposit' ? '+' : '-'} ${tx.amount.toLocaleString()} PKR
                    </div>
                    <div class="activity-status status-${tx.status}">${tx.status}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
