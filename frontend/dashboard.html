<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Profit24</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>💰 PROFIT24</h1>
            <div class="user-info">
                <span id="username"></span>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </div>
        </div>
        
        <div class="balance-card">
            <h3>My Balance</h3>
            <div class="balance-amount" id="balance">0 PKR</div>
            <div class="stats">
                <div>Total Deposit: <span id="totalDeposit">0</span> PKR</div>
                <div>Total Profit: <span id="totalProfit">0</span> PKR</div>
                <div>Referral Bonus: <span id="referralBonus">0</span> PKR</div>
            </div>
        </div>
        
        <div class="dashboard-buttons">
            <button onclick="location.href='plans.html'" class="dash-btn">💰 Deposit</button>
            <button onclick="location.href='withdraw.html'" class="dash-btn">💸 Widraw</button>
            <button onclick="location.href='my-plan.html'" class="dash-btn">📋 My Plan</button>
            <button onclick="location.href='deposit-logs.html'" class="dash-btn">📊 Deposit Logs</button>
            <button onclick="location.href='withdraw-logs.html'" class="dash-btn">📉 Widraw Logs</button>
            <button onclick="location.href='transaction-history.html'" class="dash-btn">📜 Transactions</button>
            <button onclick="location.href='my-team.html'" class="dash-btn">👥 My Team</button>
        </div>
        
        <div class="floating-whatsapp">
            <a href="https://wa.me/923123456789" target="_blank">💬</a>
        </div>
    </div>
    
    <script src="js/main.js"></script>
</body>
</html>
